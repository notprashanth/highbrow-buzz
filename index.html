<title>Highbrow Buzz</title>

<style>
:root{--bg:#f6f7f9;--card:#fff;--ink:#14171f;--muted:#6b7280;--faint:#9aa1ac;--line:#e8eaee;--accent:#2f6df6;--accent2:#eaf1ff;--green:#15924d;--amber:#b7791f;--red:#c8372d;--r:12px;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);}
.app{display:grid;grid-template-columns:212px 1fr;}
/* Sidebar */
.side{position:sticky;top:0;align-self:start;height:100vh;overflow-y:auto;background:rgba(255,255,255,.86);backdrop-filter:blur(10px);border-right:1px solid var(--line);padding:14px 10px;}
.brandrow{display:flex;align-items:center;gap:9px;padding:4px 8px 12px;}
.mark{width:30px;height:30px;border-radius:8px;background:var(--ink);color:#fff;font-weight:800;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand{font-weight:700;font-size:15px;letter-spacing:-.01em;line-height:1.1;}
.brandsub{font-size:11px;color:var(--muted);margin-top:2px;}
.navlbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:16px 8px 6px;}
.navitem{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;cursor:pointer;font-size:14px;font-weight:600;color:var(--ink);}
.navitem:hover{background:#f0f2f5;}
.navitem.active{background:var(--accent2);color:var(--accent);}
.navitem .n{margin-left:auto;font-size:11px;font-weight:600;color:var(--muted);}
.navitem.active .n{color:var(--accent);}
/* Main */
.main{min-width:0;}
.topbar{position:sticky;top:0;z-index:5;background:rgba(255,255,255,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:12px 18px 10px;}
.foot{display:flex;flex-wrap:wrap;gap:6px 18px;align-items:center;padding:18px;margin-top:8px;border-top:1px solid var(--line);color:var(--muted);font-size:12px;}
.foot b{color:var(--ink);font-weight:700;}
.bdot{display:inline-flex;align-items:center;gap:7px;}
.bdot::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px var(--accent2);}
.fresh{margin:2px 8px;padding:8px 10px;background:var(--accent2);border:1px solid var(--line);border-radius:9px;font-size:11px;color:var(--muted);}
.fresh .big{display:block;font-size:13px;font-weight:700;color:var(--accent);margin-bottom:1px;}
.pills{display:flex;gap:8px;overflow-x:auto;scrollbar-width:thin;padding-bottom:2px;}
.pill{white-space:nowrap;border:1px solid var(--line);background:#f2f3f5;color:var(--ink);padding:7px 14px;border-radius:18px;cursor:pointer;font-size:13px;font-weight:600;}
.pill.active{background:#0f0f0f;color:#fff;border-color:#0f0f0f;}
.subbar{display:flex;flex-wrap:wrap;gap:16px;margin-top:10px;align-items:center;}
.fgrp{display:flex;align-items:center;gap:5px;}
.fgrp .lbl{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin-right:3px;}
.minipill{white-space:nowrap;border:1px solid var(--line);background:#fff;color:var(--ink);padding:3px 10px;border-radius:13px;cursor:pointer;font-size:12px;}
.minipill.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.count{margin-left:auto;font-size:12px;color:var(--muted);}
.content{padding:18px;}
.kpis{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 18px;font-size:13px;color:var(--muted);}
.kpi span{display:block;font-size:24px;font-weight:700;color:var(--ink);}
.sec{font-size:14px;letter-spacing:-.02em;margin:22px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--line);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;}
.strip{display:flex;gap:16px;overflow-x:auto;padding-bottom:12px;scroll-snap-type:x proximity;}
.strip .card{flex:0 0 250px;width:250px;scroll-snap-align:start;}
.strip::-webkit-scrollbar{height:8px;} .strip::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
.tablewrap{max-height:560px;overflow-y:auto;border:1px solid var(--line);border-radius:10px;}
.tablewrap table{border:none;border-radius:0;}
.tablewrap th{position:sticky;top:0;z-index:1;}
.crcell{display:flex;align-items:center;gap:9px;}
.tav{width:26px;height:26px;border-radius:50%;flex:0 0 26px;object-fit:cover;}
.tavph{display:flex;align-items:center;justify-content:center;background:var(--accent2);color:var(--accent);font-weight:700;font-size:11px;text-transform:uppercase;}
.cr-row{cursor:pointer;}
.cr-row:hover td{background:var(--accent2);}
.crbanner{display:flex;align-items:center;gap:10px;background:var(--accent2);border:1px solid var(--line);border-radius:9px;padding:8px 12px;margin-bottom:14px;font-size:13px;}
.crbanner b{color:var(--ink);}
.crclear{margin-left:auto;background:var(--accent);color:#fff;border:none;border-radius:7px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;}
.gbadge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.72);font-size:13px;line-height:1;padding:3px 6px;border-radius:6px;}
.gchip{font-size:15px;margin-right:1px;}
.gcell{white-space:nowrap;}
.gset{font-size:15px;}
.rpills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.rkgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px;}
.rkcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 18px;}
.rkhead{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.rkrow{display:flex;align-items:center;gap:13px;padding:10px 0;border-bottom:1px solid var(--line);}
.rkrow:last-of-type{border-bottom:none;}
.rkpos{font-size:22px;font-weight:800;min-width:54px;font-variant-numeric:tabular-nums;}
.rkgame{flex:1;font-size:14.5px;font-weight:600;}
.rknc{color:var(--faint);font-size:12px;margin-top:10px;}
.flat{color:var(--faint);font-size:12px;}
.up{color:var(--green);font-weight:600;font-size:11px;}
.down{color:var(--red);font-weight:600;font-size:11px;}
.muted{color:var(--faint);}
.rnote{color:var(--muted);font-size:12px;margin-top:12px;}
.card{background:transparent;border:none;text-decoration:none;color:inherit;display:block;}
.thumb{aspect-ratio:16/9;background:#000;position:relative;border-radius:12px;overflow:hidden;}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.card:hover .thumb{filter:brightness(.94);}
.badge{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.82);color:#fff;font-size:11px;font-weight:600;padding:2px 6px;border-radius:5px;}
.livebadge{position:absolute;bottom:8px;right:8px;background:#dc2626;color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:.02em;}
.upbadge{position:absolute;bottom:8px;right:8px;background:var(--amber);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px;}
.livecard .thumb{box-shadow:0 0 0 2px var(--red);}
.upcard .thumb{box-shadow:0 0 0 2px var(--amber);}
.body{display:flex;gap:11px;margin-top:11px;align-items:flex-start;}
.av{width:36px;height:36px;border-radius:50%;flex:0 0 36px;object-fit:cover;}
.avph{display:flex;align-items:center;justify-content:center;background:var(--accent2);color:var(--accent);font-weight:700;font-size:15px;text-transform:uppercase;}
.txt{min-width:0;flex:1;}
.vtitle{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-size:14px;font-weight:600;line-height:1.35;color:var(--ink);}
.vchan{color:var(--muted);font-size:12.5px;line-height:1.55;margin-top:4px;}
.crlink{cursor:pointer;}
.vchan .crlink:hover{color:var(--ink);text-decoration:underline;}
.body>.crlink:hover .av{box-shadow:0 0 0 2px var(--accent);}
table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;font-size:13px;}
th,td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--line);}
th{background:#f0f2f5;font-size:12px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);}
td a{color:var(--accent);text-decoration:none;}
tr:last-child td{border-bottom:none;}
.empty{color:var(--muted);font-style:italic;padding:20px 0;}
.num{text-align:right;font-variant-numeric:tabular-nums;}
@media(max-width:760px){.app{grid-template-columns:1fr;}.side{position:static;height:auto;display:flex;flex-wrap:wrap;gap:4px;}.navlbl{width:100%;}}
</style></head><body>

}
function renderFresh(){
  const el=document.getElementById("fresh"); if(!el) return;
  el.innerHTML=`<span class="big">🕐 Updated ${ago(D.updatedIso)}</span>${D.updated}`;
}

/* ---- Top filter bar ---- */
function mini(dim,key,label){ return `<div class="minipill ${S[dim]===key?'active':''}" data-${dim}="${key}">${label}</div>`; }
function renderTopbar(){
  const tb = document.getElementById("topbar");
  if(!S.creator && (S.game==="overview" || S.game==="rankings" || S.game==="hacks" || S.section==="creators")){ tb.style.display="none"; return; }
  tb.style.display="block";
  const pool = S.creator ? D.videos.filter(v=>v.cid===S.creator) : gameVideos();
  const langs = uniq(pool.map(v=>v.lang)).sort();
  const lens = ["<4 min","4–12 min","12–30 min","30 min+","Unknown"].filter(l=>pool.some(v=>v.len===l));
  const sortPills = Object.entries(SORTS).map(([k,v])=>`<div class="pill ${S.sort===k?'active':''}" data-sort="${k}">${v}</div>`).join("");
  const timePills = Object.entries(TIMES).map(([k,v])=>mini("time",k,v)).join("");
  const langPills = mini("lang","all","All")+langs.map(l=>mini("lang",l,l)).join("");
  const lenPills = mini("len","all","All")+lens.map(l=>mini("len",l,l)).join("");
  tb.innerHTML = `<div class="pills">${sortPills}</div>
    <div class="subbar">
      <span class="fgrp"><span class="lbl">Time</span>${timePills}</span>
      <span class="fgrp"><span class="lbl">Language</span>${langPills}</span>
      <span class="fgrp"><span class="lbl">Length</span>${lenPills}</span>
      <span class="count" id="count"></span></div>`;
}

/* ---- Cards / tables ---- */
function whenUp(iso){
  const t=Date.parse(iso); if(!t) return "Scheduled";
  const d=t-Date.now(); if(d<=0) return "Starting soon";
  const h=Math.floor(d/3.6e6), m=Math.floor(d/6e4)%60;
  if(d<3.6e6) return "in "+Math.max(1,m)+"m";
  if(h<24) return "in "+h+"h";
  return new Date(t).toLocaleDateString(undefined,{day:'numeric',month:'short'});
}
function pinSort(a,b){
  if(a.state!==b.state) return a.state==="live"?-1:1;            // live before upcoming
  if(a.state==="upcoming") return (Date.parse(a.startsIso)||9e15)-(Date.parse(b.startsIso)||9e15);
  return b.views-a.views;
}
function publishedAgo(iso){
  const t=Date.parse(iso); if(!t) return "";
  const days=Math.floor((Date.now()-t)/864e5);
  if(days<=0) return "today";
  if(days<7) return days+(days===1?" day ago":" days ago");
  if(days<30){const w=Math.floor(days/7); return w+(w===1?" week ago":" weeks ago");}
  if(days<365){const mo=Math.floor(days/30); return mo+(mo===1?" month ago":" months ago");}
  const y=Math.floor(days/365); return y+(y===1?" year ago":" years ago");
}
function card(v, showGame){
  const img = v.thumb? `<img src="${v.thumb}" loading="lazy" alt="">` : "";
  const mins = v.dur? Math.floor(v.dur/60)+":"+String(v.dur%60).padStart(2,"0") : "";
  const gb = showGame ? `<span class="gbadge">${GEMO[v.game]||"🎬"}</span>` : "";
  let corner="", cls="";
  if(v.state==="live"){ corner=`<span class="livebadge">🔴 LIVE</span>`; cls=" livecard"; }
  else if(v.state==="upcoming"){ corner=`<span class="upbadge">⏰ ${whenUp(v.startsIso)}</span>`; cls=" upcard"; }
  else corner = mins?`<span class="badge">${mins}</span>`:"";
  const ch = D.channels[v.cid]||{};
  const av = ch.avatar
    ? `<img class="av" src="${ch.avatar}" loading="lazy" alt="">`
    : `<span class="av avph">${esc((v.ch||"?").trim()[0]||"?")}</span>`;
  // Avatar + channel name filter by creator (intercepted in wire); the rest of
  // the card opens the video on YouTube.
  const avBtn = v.cid ? `<span class="crlink" data-crcard="${v.cid}" title="Filter by ${esc(v.ch)}">${av}</span>` : av;
  const chLink = v.cid ? `<span class="crlink" data-crcard="${v.cid}">${esc(v.ch)}</span>` : esc(v.ch);
  const sub = v.state==="upcoming"
    ? chLink
    : `${chLink}<br>${fmt(v.views)} views · ${publishedAgo(v.pub)}`;
  return `<a class="card${cls}" href="https://www.youtube.com/watch?v=${v.id}" target="_blank" rel="noopener">
    <div class="thumb">${img}${gb}${corner}</div>
    <div class="body">${avBtn}<div class="txt"><div class="vtitle">${esc(v.title)}</div><div class="vchan">${sub}</div></div></div></a>`;
}
function renderGrid(vs, showGame){ return vs.length? `<div class="grid">`+vs.map(v=>card(v,showGame)).join("")+`</div>` : `<p class="empty">No videos match these filters.</p>`; }
function renderStrip(vs, showGame){ return vs.length? `<div class="strip">`+vs.map(v=>card(v,showGame)).join("")+`</div>` : `<p class="empty">Nothing live or upcoming right now.</p>`; }
function capUpcoming(pin){
  // Keep all live; cap upcoming to UPCOMING_PER_CREATOR per channel (pin is
  // pre-sorted live-first then soonest, so we keep each creator's soonest).
  const seen={}, out=[];
  for(const v of pin){
    if(v.state==="upcoming"){ seen[v.cid]=(seen[v.cid]||0)+1; if(seen[v.cid]>UPCOMING_PER_CREATOR) continue; }
    out.push(v);
  }
  return out;
}
function renderTable(vs){
  if(!vs.length) return `<p class="empty">No videos match these filters.</p>`;
  return `<table><tr><th>Video</th><th>Creator</th><th>Lang</th><th>Length</th><th class="num">Views</th><th class="num">Likes</th><th class="num">Comments</th><th class="num">Views/day</th><th>Published</th></tr>`+
    vs.map(v=>`<tr><td><a href="https://www.youtube.com/watch?v=${v.id}" target="_blank" rel="noopener">${esc(v.title.slice(0,70))}</a></td>
    <td>${esc(v.ch)}</td><td>${v.lang}</td><td>${v.len}</td><td class="num">${fmt(v.views)}</td><td class="num">${fmt(v.likes)}</td>
    <td class="num">${fmt(v.comments)}</td><td class="num">${fmt(v.vel)}</td><td>${v.pubDisp}</td></tr>`).join("")+`</table>`;
}
function leaderboard(vs){
  const m={};
  vs.forEach(v=>{ if(!v.cid)return; (m[v.cid]=m[v.cid]||{title:v.ch,videos:0,views:0,cid:v.cid}); m[v.cid].videos++; m[v.cid].views+=v.views; });
  return Object.values(m).map(a=>{a.subs=(D.channels[a.cid]||{}).subs||0;return a;}).sort((a,b)=>b.views-a.views);
}
function renderCreators(vs){
  const lb = leaderboard(vs);
  if(!lb.length) return `<p class="empty">No creators yet.</p>`;
  return `<div class="tablewrap"><table><tr><th>#</th><th>Creator</th><th>Games</th><th class="num">Subscribers</th><th class="num">Videos</th><th class="num">Total views driven</th></tr>`+
    lb.map((a,i)=>{
      const av=(D.channels[a.cid]||{}).avatar;
      const avatar = av? `<img class="tav" src="${av}" loading="lazy" alt="">` : `<span class="tav tavph">${esc((a.title||"?").trim()[0]||"?")}</span>`;
      const games = creatorGames(a.cid).map(g=>`<span class="gchip" title="${esc((D.games.find(x=>x.key===g)||{}).name||g)}">${GEMO[g]||"🎬"}</span>`).join("");
      return `<tr class="cr-row" data-cr="${a.cid}" title="Show only this creator's videos"><td>${i+1}</td><td><span class="crcell">${avatar}${esc(a.title)}</span></td><td class="gcell">${games}</td><td class="num">${fmt(a.subs)}</td><td class="num">${a.videos}</td><td class="num"><b>${fmt(a.views)}</b></td></tr>`;
    }).join("")+`</table></div>`;
}
function renderOverview(){
  const t=D.totals;
  const pin = capUpcoming(D.videos.filter(v=>v.state).sort(pinSort));
  const liveN = D.videos.filter(v=>v.state==="live").length;
  const upN = pin.filter(v=>v.state==="upcoming").length;
  const trending = D.videos.slice().sort((a,b)=>b.vel-a.vel).slice(0,8);
  return `<div class="kpis">
    <div class="kpi"><span>${t.videos}</span>videos tracked</div>
    <div class="kpi"><span>${t.creators}</span>creators</div>
    <div class="kpi"><span>${fmt(t.views)}</span>total views</div>
    <div class="kpi"><span>${liveN}</span>live now</div>
    <div class="kpi"><span>${upN}</span>upcoming</div></div>`+
    (pin.length?`<h3 class="sec">🔴 Live &amp; upcoming — all games (${pin.length})</h3>`+renderStrip(pin,true):"")+
    `<h3 class="sec">🔥 Trending across all games</h3>${renderGrid(trending,true)}
    <h3 class="sec">🏆 Top creators driving views (all games)</h3>${renderCreators(D.videos)}`;
}

function rkColor(r){ return r<=10 ? 'var(--green)' : r<=50 ? 'var(--accent)' : 'var(--amber)'; }
function rkDelta(e){
  if(!e.prev) return "";
  const diff=e.prev-e.rank;
  if(diff>0) return `<span class="up">▲${diff}</span>`;
  if(diff<0) return `<span class="down">▼${-diff}</span>`;
  return `<span class="flat">•</span>`;
}
function rankCard(ch){
  const data=(D.ranks.data[S.region]||{})[ch.key]||{};
  const entries=D.games.map(g=>({g, rank:(data[g.key]||{}).rank, prev:(data[g.key]||{}).prev}));
  const charting=entries.filter(e=>e.rank).sort((a,b)=>a.rank-b.rank);
  const notCharting=entries.filter(e=>!e.rank);
  const rows = charting.length ? charting.map(e=>`
      <div class="rkrow">
        <span class="rkpos" style="color:${rkColor(e.rank)}">#${e.rank}</span>
        <span class="rkgame">${e.g.emoji} ${esc(e.g.name)}</span>
        ${rkDelta(e)}
      </div>`).join("") : `<div class="rknc">None of our games charting</div>`;
  const nc = notCharting.length ? `<div class="rknc">Not charting: ${notCharting.map(e=>e.g.emoji+" "+esc(e.g.name)).join(" · ")}</div>` : "";
  return `<div class="rkcard"><div class="rkhead">${esc(ch.label)}</div>${rows}${nc}</div>`;
}
function renderRankings(){
  const R=D.ranks;
  if(!R) return `<p class="empty">No ranking data yet — it populates on the next daily run.</p>`;
  if(!R.regions.includes(S.region)) S.region=R.regions[0];
  const pills=R.regions.map(co=>`<span class="pill ${S.region===co?'active':''}" data-region="${co}">${esc(R.regionNames[co]||co.toUpperCase())}</span>`).join("");
  return `<h3 class="sec">📈 Play Store rankings — ${esc(R.regionNames[S.region]||S.region)}</h3>
    <div class="rpills">${pills}</div>
    <div class="rkgrid">${R.charts.map(rankCard).join("")}</div>
    <div class="rnote">As of ${R.date}${R.prevDate?` · ▲▼ vs ${R.prevDate}`:""} · rank within each chart's top 250. Color: <b style="color:var(--green)">top 10</b> · <b style="color:var(--accent)">top 50</b> · <b style="color:var(--amber)">below</b>.</div>`;
}

function renderHacks(){
  const vs = D.videos.filter(v=>v.hack).sort((a,b)=>b.views-a.views);
  if(!vs.length) return `<h3 class="sec">⚠️ Hack / Mod videos (0)</h3><p class="empty">None detected — no videos advertising hacks/mods for our games right now.</p>`;
  const byGame={}; vs.forEach(v=>byGame[v.game]=(byGame[v.game]||0)+1);
  const summary = D.games.map(g=>`${g.emoji} ${esc(g.name)}: <b>${byGame[g.key]||0}</b>`).join("   ·   ");
  return `<h3 class="sec">⚠️ Hack / Mod videos (${vs.length})</h3>
    <div class="rnote" style="margin:0 0 14px;">Videos advertising hacks, mod APKs, unlimited money/cash or unlocks — a proxy for how widely each game is being cracked. By game: ${summary}. Sorted by views (reach).</div>
    ${renderGrid(vs, true)}`;
}

/* ---- Controller ---- */
function render(){
  renderSidebar(); renderTopbar();
  const c = document.getElementById("content");
  if(S.creator){  // cross-game: ALL of this creator's videos across games
    const games = creatorGames(S.creator);
    let vs = D.videos.filter(v=>v.cid===S.creator);
    if(S.lang!=="all") vs=vs.filter(v=>v.lang===S.lang);
    if(S.len!=="all") vs=vs.filter(v=>v.len===S.len);
    if(S.time!=="all"){const cut=Date.now()-TIME_DAYS[S.time]*864e5; vs=vs.filter(v=>v.pub&&Date.parse(v.pub)>=cut);}
    vs.sort(cmp[S.sort]);
    const body = S.section==="table" ? renderTable(vs) : renderGrid(vs, true);
    c.innerHTML = crBanner(games) + body;
    setCount(vs.length); wire(); return;
  }
  if(S.game==="rankings"){ c.innerHTML = renderRankings(); wire(); return; }
  if(S.game==="hacks"){ c.innerHTML = renderHacks(); wire(); return; }
  if(S.game==="overview"){ c.innerHTML = renderOverview(); wire(); return; }
  if(S.section==="creators"){ c.innerHTML = renderCreators(gameVideos()); wire(); return; }
  const vs = filtered();
  if(S.section==="table"){ c.innerHTML = renderTable(vs); setCount(vs.length); wire(); return; }
  // Live + upcoming pinned together on top (ignoring length/time so they always
  // show); live first, then upcoming by soonest start. Main grid = the rest.
  const pin = capUpcoming(gameVideos().filter(v=>v.state).filter(v=>S.lang==="all"||v.lang===S.lang).filter(v=>!S.creator||v.cid===S.creator).sort(pinSort));
  const rest = vs.filter(v=>!v.state);
  let h = "";
  if(pin.length) h += `<h3 class="sec">🔴 Live &amp; upcoming (${pin.length})</h3>`+renderStrip(pin);
  h += (pin.length?`<h3 class="sec">📺 All videos</h3>`:"")+renderGrid(rest);
  c.innerHTML = h; setCount(vs.length); wire();
}
function setCount(n){ const el=document.getElementById("count"); if(el) el.textContent=n+" videos"; }
function on(sel,fn){ document.querySelectorAll(sel).forEach(b=>b.onclick=()=>fn(b)); }
function wire(){
  on("[data-g]", b=>{S.game=b.dataset.g; S.section="videos"; S.lang="all"; S.len="all"; S.time="all"; S.creator=""; render();});
  // View buttons honor an active creator filter: Videos/Table stay scoped to the
  // creator (cross-game); Creators exits the filter to show the full leaderboard.
  on("[data-s]", b=>{ if(b.dataset.s==="creators") S.creator=""; S.section=b.dataset.s; render();});
  on("[data-sort]", b=>{S.sort=b.dataset.sort; render();});
  on("[data-time]", b=>{S.time=b.dataset.time; render();});
  on("[data-lang]", b=>{S.lang=b.dataset.lang; render();});
  on("[data-len]", b=>{S.len=b.dataset.len; render();});
  // Click a creator row -> jump to that creator's videos (switch to their game).
  on("[data-cr]", b=>{S.creator=b.dataset.cr; const gv=D.videos.find(v=>v.cid===S.creator); if(gv) S.game=gv.game; S.section="videos"; render();});
  on("[data-clearcr]", ()=>{S.creator=""; render();});
  on("[data-region]", b=>{S.region=b.dataset.region; render();});
  // Avatar / channel name on a card: filter by creator instead of opening YouTube.
  document.querySelectorAll("[data-crcard]").forEach(el=>el.onclick=(e)=>{
    e.preventDefault(); e.stopPropagation();
    S.creator=el.dataset.crcard;
    const gv=D.videos.find(v=>v.cid===S.creator); if(gv) S.game=gv.game;
    S.section="videos"; render();
  });
}
render();
setInterval(renderFresh, 60000);  // keep the "updated X ago" relative time live
</script></body></html>
