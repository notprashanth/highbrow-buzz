<style>
:root{--bg:#f6f7f9;--card:#fff;--ink:#14171f;--muted:#6b7280;--faint:#9aa1ac;--line:#e8eaee;--accent:#2f6df6;--accent2:#eaf1ff;--green:#15924d;--amber:#b7791f;--red:#c8372d;--r:12px;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);}
.app{display:grid;grid-template-columns:212px 1fr;}
/* Sidebar */
.side{position:sticky;top:0;align-self:start;height:100vh;overflow-y:auto;background:rgba(255,255,255,.86);backdrop-filter:blur(10px);border-right:1px solid var(--line);padding:14px 10px;}
.brandrow{display:flex;align-items:center;gap:9px;padding:4px 8px 12px;}
.mark{width:30px;height:30px;border-radius:8px;background:var(--ink);color:#fff;font-weight:800;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand{font-weight:700;font-size:15px;letter-spacing:-.01em;line-height:1.1;}
.brandsub{font-size:11px;color:var(--muted);margin-top:2px;}
.navlbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:16px 8px 6px;}
.navitem{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;cursor:pointer;font-size:14px;font-weight:600;color:var(--ink);}
.navitem:hover{background:#f0f2f5;}
.navitem.active{background:var(--accent2);color:var(--accent);}
.navitem .n{margin-left:auto;font-size:11px;font-weight:600;color:var(--muted);}
.navitem.active .n{color:var(--accent);}
/* Main */
.main{min-width:0;}
.topbar{position:sticky;top:0;z-index:5;background:rgba(255,255,255,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:12px 18px 10px;}
.foot{display:flex;flex-wrap:wrap;gap:6px 18px;align-items:center;padding:18px;margin-top:8px;border-top:1px solid var(--line);color:var(--muted);font-size:12px;}
.foot b{color:var(--ink);font-weight:700;}
.bdot{display:inline-flex;align-items:center;gap:7px;}
.bdot::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px var(--accent2);}
.pills{display:flex;gap:8px;overflow-x:auto;scrollbar-width:thin;padding-bottom:2px;}
.pill{white-space:nowrap;border:1px solid var(--line);background:#f2f3f5;color:var(--ink);padding:7px 14px;border-radius:18px;cursor:pointer;font-size:13px;font-weight:600;}
.pill.active{background:#0f0f0f;color:#fff;border-color:#0f0f0f;}
.subbar{display:flex;flex-wrap:wrap;gap:16px;margin-top:10px;align-items:center;}
.fgrp{display:flex;align-items:center;gap:5px;}
.fgrp .lbl{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin-right:3px;}
.minipill{white-space:nowrap;border:1px solid var(--line);background:#fff;color:var(--ink);padding:3px 10px;border-radius:13px;cursor:pointer;font-size:12px;}
.minipill.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.count{margin-left:auto;font-size:12px;color:var(--muted);}
.content{padding:18px;}
.kpis{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 18px;font-size:13px;color:var(--muted);}
.kpi span{display:block;font-size:24px;font-weight:700;color:var(--ink);}
.sec{font-size:14px;letter-spacing:-.02em;margin:22px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--line);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;text-decoration:none;color:inherit;transition:box-shadow .15s,transform .15s;}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.10);transform:translateY(-2px);}
.thumb{aspect-ratio:16/9;background:#000;position:relative;}
.thumb img{width:100%;height:100%;object-fit:cover;}
.badge{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.78);color:#fff;font-size:11px;padding:2px 6px;border-radius:4px;}
.livebadge{position:absolute;bottom:6px;right:6px;background:#dc2626;color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.02em;}
.livecard{border-color:#dc2626;box-shadow:0 0 0 1px #dc2626;}
.upbadge{position:absolute;bottom:6px;right:6px;background:var(--amber);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;}
.upcard{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber);}
.lang{position:absolute;top:6px;left:6px;background:rgba(37,99,235,.92);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;}
.meta{padding:10px 11px;}
.vtitle{font-size:13px;font-weight:600;line-height:1.3;max-height:3.4em;overflow:hidden;}
.vchan{color:var(--muted);font-size:12px;margin:5px 0 3px;}
.vstats{color:var(--muted);font-size:11px;}
table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;font-size:13px;}
th,td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--line);}
th{background:#f0f2f5;font-size:12px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);}
td a{color:var(--accent);text-decoration:none;}
tr:last-child td{border-bottom:none;}
.empty{color:var(--muted);font-style:italic;padding:20px 0;}
.num{text-align:right;font-variant-numeric:tabular-nums;}
@media(max-width:760px){.app{grid-template-columns:1fr;}.side{position:static;height:auto;display:flex;flex-wrap:wrap;gap:4px;}.navlbl{width:100%;}}
</style></head><body>

const S = {game:"overview", section:"videos", sort:"views", lang:"all", len:"all", time:"all"};
const fmt = n => { n=n||0; return n>=1e6?(n/1e6).toFixed(1)+"M":n>=1e3?(n/1e3).toFixed(1)+"K":(""+Math.round(n)); };
const SORTS = {views:"Most viewed", newest:"Newest", velocity:"Fastest-growing", likes:"Most liked"};
const TIMES = {all:"All time", today:"Today", "7d":"7 days", "30d":"30 days"};
const TIME_DAYS = {today:1, "7d":7, "30d":30};
const cmp = {views:(a,b)=>b.views-a.views, newest:(a,b)=>(b.pub>a.pub?1:-1),
             velocity:(a,b)=>b.vel-a.vel, likes:(a,b)=>b.likes-a.likes};

function gameVideos(){ return D.videos.filter(v=>v.game===S.game); }
function filtered(){
  let vs = S.game==="overview" ? D.videos.slice() : gameVideos();
  if(S.lang!=="all") vs = vs.filter(v=>v.lang===S.lang);
  if(S.len!=="all") vs = vs.filter(v=>v.len===S.len);
  if(S.time!=="all"){ const cut=Date.now()-TIME_DAYS[S.time]*864e5; vs = vs.filter(v=>v.pub && Date.parse(v.pub)>=cut); }
  vs.sort(cmp[S.sort]);
  return vs;
}
function uniq(arr){ return [...new Set(arr)]; }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ---- Sidebar ---- */
function navItem(kind,key,label,n){
  const active = kind==="g" ? S.game===key : S.section===key;
  const badge = (n!==undefined && n!==null) ? `<span class="n">${n}</span>` : "";
  return `<div class="navitem ${active?'active':''}" data-${kind}="${key}">${label}${badge}</div>`;
}
function renderSidebar(){
  document.getElementById("games").innerHTML =
    navItem("g","overview","📊 Overview", D.videos.length)
    + D.games.map(g=>navItem("g",g.key, g.emoji+" "+g.name,
        D.videos.filter(v=>v.game===g.key).length)).join("");
  const views=[["videos","📺 Videos"],["table","📊 Table"],["creators","🏆 Creators"]];
  document.getElementById("views").innerHTML = views.map(([k,l])=>navItem("s",k,l)).join("");
  document.getElementById("viewgroup").style.display = S.game==="overview" ? "none" : "block";
  document.getElementById("sideupd").textContent = D.updated;
}

/* ---- Top filter bar ---- */
function mini(dim,key,label){ return `<div class="minipill ${S[dim]===key?'active':''}" data-${dim}="${key}">${label}</div>`; }
function renderTopbar(){
  const tb = document.getElementById("topbar");
  if(S.game==="overview" || S.section==="creators"){ tb.style.display="none"; return; }
  tb.style.display="block";
  const pool = gameVideos();
  const langs = uniq(pool.map(v=>v.lang)).sort();
  const lens = ["<4 min","4–12 min","12–30 min","30 min+","Unknown"].filter(l=>pool.some(v=>v.len===l));
  const sortPills = Object.entries(SORTS).map(([k,v])=>`<div class="pill ${S.sort===k?'active':''}" data-sort="${k}">${v}</div>`).join("");
  const timePills = Object.entries(TIMES).map(([k,v])=>mini("time",k,v)).join("");
  const langPills = mini("lang","all","All")+langs.map(l=>mini("lang",l,l)).join("");
  const lenPills = mini("len","all","All")+lens.map(l=>mini("len",l,l)).join("");
  tb.innerHTML = `<div class="pills">${sortPills}</div>
    <div class="subbar">
      <span class="fgrp"><span class="lbl">Time</span>${timePills}</span>
      <span class="fgrp"><span class="lbl">Language</span>${langPills}</span>
      <span class="fgrp"><span class="lbl">Length</span>${lenPills}</span>
      <span class="count" id="count"></span></div>`;
}

/* ---- Cards / tables ---- */
function whenUp(iso){
  const t=Date.parse(iso); if(!t) return "Scheduled";
  const d=t-Date.now(); if(d<=0) return "Starting soon";
  const h=Math.floor(d/3.6e6), m=Math.floor(d/6e4)%60;
  if(d<3.6e6) return "in "+Math.max(1,m)+"m";
  if(h<24) return "in "+h+"h";
  return new Date(t).toLocaleDateString(undefined,{day:'numeric',month:'short'});
}
function pinSort(a,b){
  if(a.state!==b.state) return a.state==="live"?-1:1;            // live before upcoming
  if(a.state==="upcoming") return (Date.parse(a.startsIso)||9e15)-(Date.parse(b.startsIso)||9e15);
  return b.views-a.views;
}
function card(v){
  const img = v.thumb? `<img src="${v.thumb}" loading="lazy" alt="">` : "";
  const mins = v.dur? Math.floor(v.dur/60)+":"+String(v.dur%60).padStart(2,"0") : "";
  let corner, cls="";
  if(v.state==="live"){ corner=`<span class="livebadge">🔴 LIVE</span>`; cls=" livecard"; }
  else if(v.state==="upcoming"){ corner=`<span class="upbadge">⏰ ${whenUp(v.startsIso)}</span>`; cls=" upcard"; }
  else corner = mins?`<span class="badge">${mins}</span>`:"";
  return `<a class="card${cls}" href="https://www.youtube.com/watch?v=${v.id}" target="_blank" rel="noopener">
    <div class="thumb">${img}<span class="lang">${v.lang}</span>${corner}</div>
    <div class="meta"><div class="vtitle">${esc(v.title)}</div><div class="vchan">${esc(v.ch)}</div>
    <div class="vstats">▶ ${fmt(v.views)} · 👍 ${fmt(v.likes)} · 💬 ${fmt(v.comments)} · ${v.pubDisp}</div></div></a>`;
}
function renderGrid(vs){ return vs.length? `<div class="grid">`+vs.map(card).join("")+`</div>` : `<p class="empty">No videos match these filters.</p>`; }
function renderTable(vs){
  if(!vs.length) return `<p class="empty">No videos match these filters.</p>`;
  return `<table><tr><th>Video</th><th>Creator</th><th>Lang</th><th>Length</th><th class="num">Views</th><th class="num">Likes</th><th class="num">Comments</th><th class="num">Views/day</th><th>Published</th></tr>`+
    vs.map(v=>`<tr><td><a href="https://www.youtube.com/watch?v=${v.id}" target="_blank" rel="noopener">${esc(v.title.slice(0,70))}</a></td>
    <td>${esc(v.ch)}</td><td>${v.lang}</td><td>${v.len}</td><td class="num">${fmt(v.views)}</td><td class="num">${fmt(v.likes)}</td>
    <td class="num">${fmt(v.comments)}</td><td class="num">${fmt(v.vel)}</td><td>${v.pubDisp}</td></tr>`).join("")+`</table>`;
}
function leaderboard(vs){
  const m={};
  vs.forEach(v=>{ if(!v.cid)return; (m[v.cid]=m[v.cid]||{title:v.ch,videos:0,views:0,cid:v.cid}); m[v.cid].videos++; m[v.cid].views+=v.views; });
  return Object.values(m).map(a=>{a.subs=(D.channels[a.cid]||{}).subs||0;return a;}).sort((a,b)=>b.views-a.views);
}
function renderCreators(vs){
  const lb = leaderboard(vs);
  if(!lb.length) return `<p class="empty">No creators yet.</p>`;
  return `<table><tr><th>#</th><th>Creator</th><th class="num">Subscribers</th><th class="num">Videos</th><th class="num">Total views driven</th></tr>`+
    lb.map((a,i)=>`<tr><td>${i+1}</td><td>${esc(a.title)}</td><td class="num">${fmt(a.subs)}</td><td class="num">${a.videos}</td><td class="num"><b>${fmt(a.views)}</b></td></tr>`).join("")+`</table>`;
}
function renderOverview(){
  const t=D.totals;
  const pin = D.videos.filter(v=>v.state).sort(pinSort);
  const liveN = D.videos.filter(v=>v.state==="live").length;
  const upN = D.videos.filter(v=>v.state==="upcoming").length;
  const trending = D.videos.slice().sort((a,b)=>b.vel-a.vel).slice(0,8);
  return `<div class="kpis">
    <div class="kpi"><span>${t.videos}</span>videos tracked</div>
    <div class="kpi"><span>${t.creators}</span>creators</div>
    <div class="kpi"><span>${fmt(t.views)}</span>total views</div>
    <div class="kpi"><span>${liveN}</span>live now</div>
    <div class="kpi"><span>${upN}</span>upcoming</div></div>`+
    (pin.length?`<h3 class="sec">🔴 Live &amp; upcoming — all games (${pin.length})</h3>`+renderGrid(pin):"")+
    `<h3 class="sec">🔥 Trending across all games</h3>${renderGrid(trending)}
    <h3 class="sec">🏆 Top creators driving views (all games)</h3>${renderCreators(D.videos)}`;
}

/* ---- Controller ---- */
function render(){
  renderSidebar(); renderTopbar();
  const c = document.getElementById("content");
  if(S.game==="overview"){ c.innerHTML = renderOverview(); wire(); return; }
  if(S.section==="creators"){ c.innerHTML = renderCreators(gameVideos()); wire(); return; }
  const vs = filtered();
  if(S.section==="table"){ c.innerHTML = renderTable(vs); setCount(vs.length); wire(); return; }
  // Live + upcoming pinned together on top (ignoring length/time so they always
  // show); live first, then upcoming by soonest start. Main grid = the rest.
  const pin = gameVideos().filter(v=>v.state).filter(v=>S.lang==="all"||v.lang===S.lang).sort(pinSort);
  const rest = vs.filter(v=>!v.state);
  let h = "";
  if(pin.length) h += `<h3 class="sec">🔴 Live &amp; upcoming (${pin.length})</h3>`+renderGrid(pin);
  h += (pin.length?`<h3 class="sec">📺 All videos</h3>`:"")+renderGrid(rest);
  c.innerHTML = h; setCount(vs.length); wire();
}
function setCount(n){ const el=document.getElementById("count"); if(el) el.textContent=n+" videos"; }
function on(sel,fn){ document.querySelectorAll(sel).forEach(b=>b.onclick=()=>fn(b)); }
function wire(){
  on("[data-g]", b=>{S.game=b.dataset.g; S.section="videos"; S.lang="all"; S.len="all"; S.time="all"; render();});
  on("[data-s]", b=>{S.section=b.dataset.s; render();});
  on("[data-sort]", b=>{S.sort=b.dataset.sort; render();});
  on("[data-time]", b=>{S.time=b.dataset.time; render();});
  on("[data-lang]", b=>{S.lang=b.dataset.lang; render();});
  on("[data-len]", b=>{S.len=b.dataset.len; render();});
}
render();
</script></body></html>
